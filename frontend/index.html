    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot Tư vấn BHXH tự nguyện & BHYT hộ gia đình</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
            extend: {
                fontFamily: {
                    sans: ['Montserrat', 'sans-serif'],
                },
                colors: {
                  bhxh: {
                    50: '#f0f9ff',
                    100: '#e0f2fe',
                    200: '#bae6fd',
                    300: '#7dd3fc',
                    400: '#38bdf8',
                    500: '#008ACD',
                    600: '#0066A3',
                    700: '#0369a1',
                    800: '#075985',
                    900: '#0c4a6e',
                  }
                },
                fontSize: {
                  'md': '1.05rem',
                }
            }
        }
      }
    </script>
<style>
    body { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }
    
    .animate-reveal { 
        animation: reveal 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; 
    }
    @keyframes reveal { 
        0% { opacity: 0; transform: translateY(20px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-user {
        background: linear-gradient(135deg, #008ACD 0%, #0066A3 100%);
        box-shadow: 0 4px 15px -3px rgba(0, 138, 205, 0.3);
    }

    .message-bot {
        background: #ffffff;
        box-shadow: 0 2px 10px -2px rgba(0, 0, 0, 0.05);
        border: 1px solid #f1f5f9;
    }

    .animate-typing-cursor::after {
        content: "|";
        animation: blink 0.8s infinite;
        margin-left: 2px;
        color: #008ACD;
        font-weight: 900;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    
    .custom-scrollbar::-webkit-scrollbar { width: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* Disable Animations Class */
    .no-animations * {
        animation: none !important;
        transition: none !important;
    }
    .no-animations .animate-typing-cursor::after {
        display: none !important;
    }

    /* Markdown Enhancements */
    .markdown-container h1, .markdown-container h2, .markdown-container h3 {
        font-weight: 800;
        color: #0066A3;
        margin-top: 1rem;
        margin-bottom: 0.5rem;
    }
    .markdown-container p { line-height: 1.7; margin-bottom: 1rem; }
    .markdown-container ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
    .markdown-container li { margin-bottom: 0.4rem; }
    
    .table-scroll-wrapper {
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid #e2e8f0;
        margin: 1.5rem 0;
    }
    .markdown-container table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    .markdown-container th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; font-weight: 800; }
    .markdown-container td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
    .markdown-container tr:hover { background: #f1f5f9; }
</style>

}
